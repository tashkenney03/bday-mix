<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kalio's Mix</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Lato:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf6ee;--orange:#e8611a;--ink:#1c1410;--ink-mid:#5a4535;--ink-dim:#9a8070}
body{background:var(--bg);font-family:'Lato',sans-serif;color:var(--ink);overflow-x:hidden}

/* HEADER */
header{padding:28px 24px 14px;text-align:center}
.hdr-eyebrow{font-size:11px;font-weight:500;letter-spacing:5px;color:var(--orange);text-transform:uppercase;margin-bottom:8px}
.hdr-name{font-family:'Bodoni Moda',serif;font-style:italic;font-weight:700;font-size:54px;line-height:1;color:var(--ink);letter-spacing:-2px}
.hdr-sub{font-size:11px;font-weight:400;letter-spacing:3px;color:var(--ink-mid);text-transform:uppercase;margin-top:4px;opacity:.65}

/* SWIPER */
.swiper-area{width:100%;overflow:hidden;touch-action:none;height:400px;display:flex;align-items:center}
.cards-track{display:flex;align-items:center;height:100%;will-change:transform}
.card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px}
.cover-img{display:block;width:min(68vw,270px);height:min(68vw,270px);object-fit:cover;border-radius:4px;box-shadow:0 2px 0 rgba(232,97,26,.3),0 10px 36px rgba(28,20,16,.18)}
.card.active .cover-img{box-shadow:0 2px 0 rgba(232,97,26,.6),0 14px 44px rgba(28,20,16,.22)}
.card-info{margin-top:16px;text-align:center;width:min(68vw,270px)}
.card-counter{font-size:10px;letter-spacing:4px;color:var(--orange);opacity:.65;margin-bottom:4px}
.card-title{font-family:'Bodoni Moda',serif;font-style:italic;font-weight:700;font-size:20px;color:var(--ink);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-artist{font-size:10px;letter-spacing:3px;color:var(--ink-mid);text-transform:uppercase;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CONTROLS */
.controls{padding:12px 24px 24px;display:flex;align-items:center;justify-content:center;gap:16px}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(232,97,26,.28);background:#f5efe4;color:var(--orange);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 2px 0 rgba(232,97,26,.15)}
.nav-btn:active{background:rgba(232,97,26,.08);transform:translateY(1px)}
.needle-btn{flex:1;max-width:210px;padding:13px 0;border:none;border-radius:40px;cursor:pointer;font-family:'Bodoni Moda',serif;font-style:italic;font-weight:700;font-size:17px;color:#fff;background:var(--orange);box-shadow:0 3px 0 #b84a10,0 6px 20px rgba(232,97,26,.28);white-space:nowrap;position:relative;overflow:hidden}
.needle-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 100%);border-radius:40px 40px 0 0;pointer-events:none}
.needle-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #b84a10}

/* TRACKLIST */
.tracklist{border-top:1px solid rgba(232,97,26,.18)}
.tracklist-heading{padding:18px 20px 10px;font-family:'Bodoni Moda',serif;font-style:italic;font-weight:700;font-size:22px;color:var(--ink)}
#tracklist-rows{height:392px;overflow-y:auto;padding-bottom:20px}
#tracklist-rows::-webkit-scrollbar{width:3px}
#tracklist-rows::-webkit-scrollbar-thumb{background:rgba(232,97,26,.25);border-radius:2px}
.track-row{display:flex;align-items:center;gap:12px;padding:9px 20px;border-bottom:1px solid rgba(232,97,26,.07);cursor:pointer;transition:background .15s}
.track-row:active{background:rgba(232,97,26,.08)}
.track-row.active{background:rgba(232,97,26,.1)}
.tr-num{font-size:11px;color:var(--ink-dim);min-width:20px;text-align:right;flex-shrink:0}
.tr-thumb{width:38px;height:38px;border-radius:3px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 6px rgba(28,20,16,.14)}
.tr-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tr-info{flex:1;min-width:0}
.tr-title{font-family:'Bodoni Moda',serif;font-style:italic;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-artist{font-size:10px;letter-spacing:1.5px;color:var(--ink-dim);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.tr-apple{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:28px;height:28px;text-decoration:none;opacity:.55;transition:opacity .2s}
.tr-apple:active{opacity:1}
.tr-apple svg{width:20px;height:20px}

/* VINYL OVERLAY */
.voverlay{position:fixed;inset:0;z-index:900;background:rgba(12,6,2,0);display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;transition:background .5s ease}
.voverlay.open{background:rgba(12,6,2,.93);pointer-events:all}
.vclose{position:absolute;top:22px;right:22px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(240,230,210,.8);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .3s ease .6s}
.voverlay.open .vclose{opacity:1}

/* Disc morphs from square to circle */
.vdisc-wrap{position:relative;width:min(72vw,290px);height:min(72vw,290px);border-radius:6px;opacity:0;transform:scale(.85);transition:opacity .35s ease,transform .45s cubic-bezier(.34,1.3,.64,1),border-radius .65s cubic-bezier(.4,0,.2,1)}
.voverlay.open .vdisc-wrap{opacity:1;transform:scale(1);border-radius:50%}

/* Spin */
@keyframes vspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.vdisc-wrap.spinning{animation:vspin 2s linear infinite;animation-play-state:paused}
.vdisc-wrap.spinning.playing{animation-play-state:running}

.vdisc{position:absolute;inset:0;border-radius:inherit;overflow:hidden;transition:border-radius .65s cubic-bezier(.4,0,.2,1)}
.vart{width:100%;height:100%;object-fit:cover;display:block;transition:filter .6s ease .3s}
.voverlay.open .vart{filter:brightness(.75) saturate(.85)}
.vgrooves{position:absolute;inset:0;opacity:0;transition:opacity .5s ease .5s;pointer-events:none;background:repeating-radial-gradient(circle at center,transparent 0px,transparent 8px,rgba(0,0,0,.4) 8px,rgba(0,0,0,.4) 9px)}
.voverlay.open .vgrooves{opacity:1}
.vsheen{position:absolute;inset:0;opacity:0;pointer-events:none;background:conic-gradient(from 190deg,transparent 0deg,rgba(255,255,255,.07) 55deg,transparent 110deg,rgba(255,255,255,.03) 200deg,transparent 260deg);transition:opacity .5s ease .6s}
.voverlay.open .vsheen{opacity:1}
.vspindle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ddd,#888);z-index:4;opacity:0;transition:opacity .3s ease .7s}
.voverlay.open .vspindle{opacity:1}

/* Tonearm — outside disc so it stays fixed */
.varm{position:fixed;width:min(38vw,150px);height:min(38vw,150px);top:calc(50vh - min(36vw,145px) - 10px);right:calc(50vw - min(36vw,145px) - 10px);transform-origin:88% 10%;transform:rotate(25deg);opacity:0;transition:opacity .4s ease .7s,transform 1s cubic-bezier(.4,0,.2,1) .8s;pointer-events:none;z-index:920}
.voverlay.open .varm{opacity:1;transform:rotate(2deg)}

/* Info */
.vinfo{margin-top:22px;text-align:center;opacity:0;transform:translateY(8px);transition:opacity .4s ease .65s,transform .4s ease .65s}
.voverlay.open .vinfo{opacity:1;transform:translateY(0)}
.vinfo-title{font-family:'Bodoni Moda',serif;font-style:italic;font-weight:700;font-size:20px;color:#f0e6cc}
.vinfo-artist{font-size:11px;letter-spacing:3px;color:#c47c2f;text-transform:uppercase;margin-top:3px}
.vinfo-apple{display:inline-flex;align-items:center;gap:6px;margin-top:12px;text-decoration:none;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:7px 14px;transition:background .2s}
.vinfo-apple:active{background:rgba(255,255,255,0.2)}
.vinfo-apple-text{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase}

/* Playback controls */
.vcontrols{display:flex;align-items:center;gap:20px;margin-top:18px;opacity:0;transition:opacity .4s ease .75s}
.voverlay.open .vcontrols{opacity:1}
.vcbtn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#f0e6cc;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.vcbtn:active{background:rgba(232,97,26,.25)}
.vcbtn.vcplay{width:54px;height:54px;font-size:20px;background:var(--orange);border-color:var(--orange);box-shadow:0 3px 0 #b84a10}
.vcbtn.vcplay:active{transform:translateY(2px);box-shadow:0 1px 0 #b84a10}

/* Progress */
.vprog-wrap{width:min(72vw,290px);margin-top:14px;opacity:0;transition:opacity .4s ease .8s}
.voverlay.open .vprog-wrap{opacity:1}
.vprog-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer}
.vprog-fill{height:100%;background:var(--orange);border-radius:2px;width:0%;pointer-events:none}
.vprog-times{display:flex;justify-content:space-between;font-size:10px;color:rgba(240,230,204,.4);margin-top:5px;letter-spacing:1px}
.vlyr-btn{margin-top:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:rgba(240,230,204,0.8);font-family:'Lato',sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:20px;cursor:pointer;transition:background .2s}
.vlyr-btn:active{background:rgba(255,255,255,0.15)}
.vlyr-panel{width:min(80vw,320px);max-height:0;overflow:hidden;transition:max-height 0.4s ease;margin-top:0}
.vlyr-panel.open{max-height:240px;overflow-y:auto;margin-top:12px}
.vlyr-panel::-webkit-scrollbar{width:2px}
.vlyr-panel::-webkit-scrollbar-thumb{background:rgba(196,124,47,0.4);border-radius:2px}
.vlyr-content{font-family:'Bodoni Moda',serif;font-style:italic;font-size:14px;color:rgba(240,230,204,0.75);line-height:2;text-align:center;padding:4px 8px 12px}
</style>
</head>
<body>

  <header>

</div>

<!-- VINYL OVERLAY -->
<div class="voverlay" id="voverlay">

  <div class="vdisc-wrap" id="vdisc-wrap">

      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="16" height="16"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      <span class="vinfo-apple-text">Add to Apple Music</span>
    </a>
    <button class="vlyr-btn" id="vlyr-btn" onclick="toggleLyrics()">&#9836; Lyrics</button>
  </div>

  <!-- Lyrics panel -->
  <div class="vlyr-panel" id="vlyr-panel">

  </div>

  <div class="vcontrols">

    <button class="vcbtn vcplay" id="vc-play">&#9654;</button>
    <button class="vcbtn" id="vc-next">&#9654;&#9654;</button>
  </div>

  <div class="vprog-wrap">
    <div class="vprog-bar" id="vprog-bar">

    </div>
    <div class="vprog-times">
      <span id="vprog-cur">0:00</span>
      <span id="vprog-dur">0:00</span>
    </div>
  </div>
</div>

];

/* Apple Music SVG icon string for tracklist */
const amSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#fc3c44" width="20" height="20"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;

/* ── SWIPER ── */
let current=0, dragging=false, startX=0, deltaX=0;
const areaEl=document.getElementById('swiper-area');
const trackEl=document.getElementById('cards-track');

function buildSwiper(){
  tracks.forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='card'+(i===0?' active':'');
    el.style.width=areaEl.clientWidth+'px';
    el.innerHTML=`<img class="cover-img" src="${t.img}" alt="${t.title}" onerror="this.style.background='#ddd4c0'">
      <div class="card-info">
        <div class="card-counter">${String(i+1).padStart(2,'0')} of ${tracks.length}</div>
        <div class="card-title">${t.title}</div>
        <div class="card-artist">${t.artist}</div>
      </div>`;
    trackEl.appendChild(el);
  });
  layout(false);
}

function layout(animated){
  const w=areaEl.clientWidth, x=-(current*w)+(dragging?deltaX:0);
  trackEl.style.transition=animated?'transform 0.36s cubic-bezier(0.25,0.46,0.45,0.94)':'none';
  trackEl.style.transform=`translateX(${x}px)`;
  Array.from(trackEl.children).forEach((c,i)=>{ c.style.width=w+'px'; c.classList.toggle('active',i===current); });
  document.querySelectorAll('.track-row').forEach((r,i)=>r.classList.toggle('active',i===current));
}

function goTo(i){ current=Math.max(0,Math.min(tracks.length-1,i)); deltaX=0; layout(true); }
document.getElementById('btn-prev').onclick=()=>goTo(current-1);
document.getElementById('btn-next').onclick=()=>goTo(current+1);
areaEl.addEventListener('touchstart',e=>{ startX=e.touches[0].clientX; deltaX=0; dragging=true; trackEl.style.transition='none'; },{passive:true});
areaEl.addEventListener('touchmove',e=>{ if(!dragging)return; deltaX=e.touches[0].clientX-startX; layout(false); e.preventDefault(); },{passive:false});
areaEl.addEventListener('touchend',()=>{ if(!dragging)return; dragging=false; if(deltaX<-50)goTo(current+1); else if(deltaX>50)goTo(current-1); else{deltaX=0;layout(true);} });
areaEl.addEventListener('mousedown',e=>{ startX=e.clientX; deltaX=0; dragging=true; trackEl.style.transition='none'; });
window.addEventListener('mousemove',e=>{ if(!dragging)return; deltaX=e.clientX-startX; layout(false); });
window.addEventListener('mouseup',()=>{ if(!dragging)return; dragging=false; if(deltaX<-60)goTo(current+1); else if(deltaX>60)goTo(current-1); else{deltaX=0;layout(true);} });
window.addEventListener('resize',()=>layout(false));

/* ── TRACKLIST ── */
function buildTracklist(){
  const el=document.getElementById('tracklist-rows');
  tracks.forEach((t,i)=>{
    const row=document.createElement('div');
    row.className='track-row'+(i===0?' active':'');
    row.innerHTML=`<span class="tr-num">${String(i+1).padStart(2,'0')}</span>
      <div class="tr-thumb"><img src="${t.img}" alt="" onerror="this.style.background='#ddd4c0'"></div>
      <div class="tr-info">
        <div class="tr-title">${t.title}</div>
        <div class="tr-artist">${t.artist}</div>
      </div>
      <a class="tr-apple" href="${t.apple}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${amSVG}</a>`;
    row.addEventListener('click',()=>{ goTo(i); window.scrollTo({top:0,behavior:'smooth'}); });
    el.appendChild(row);
  });
}

/* ── VINYL + AUDIO ── */
let vcIdx=0, vcPlaying=false, vcTimer=null;
const audio=new Audio();

function fmt(s){ return isNaN(s)?'0:00':Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function spinStart(){
  const w=document.getElementById('vdisc-wrap');
  if(!w.classList.contains('spinning')){ void w.offsetWidth; w.classList.add('spinning'); }
  w.classList.add('playing');
}
function spinPause(){ document.getElementById('vdisc-wrap').classList.remove('playing'); }
function spinReset(){ const w=document.getElementById('vdisc-wrap'); w.classList.remove('spinning','playing'); void w.offsetWidth; }

function startProgress(){
  clearInterval(vcTimer);
  vcTimer=setInterval(()=>{
    const cur=audio.currentTime||0, dur=audio.duration||0;
    document.getElementById('vprog-fill').style.width=(dur>0?(cur/dur)*100:0)+'%';
    document.getElementById('vprog-cur').textContent=fmt(cur);
    document.getElementById('vprog-dur').textContent=fmt(dur);
  },200);
}

/* Audio events drive everything */
audio.addEventListener('play', ()=>{ vcPlaying=true; spinStart(); startProgress(); document.getElementById('vc-play').innerHTML='&#9646;&#9646;'; });
audio.addEventListener('pause',()=>{ vcPlaying=false; spinPause(); clearInterval(vcTimer); document.getElementById('vc-play').innerHTML='&#9654;'; });
audio.addEventListener('ended',()=>{ vcGo((vcIdx+1)%tracks.length); });

function openVinyl(idx){
  vcIdx=idx;
  const t=tracks[idx];

  /* Update visuals */
  document.getElementById('vart').src=t.img;
  document.getElementById('vinfo-title').textContent=t.title;
  document.getElementById('vinfo-artist').textContent=t.artist;
  document.getElementById('vinfo-apple').href=t.apple;
  updateLyrics(idx);

  /* Reset */
  audio.pause();
  audio.src='./'+String(t.n).padStart(2,'0')+'.mp3';
  spinReset();
  document.getElementById('vprog-fill').style.width='0%';
  document.getElementById('vprog-cur').textContent='0:00';
  document.getElementById('vprog-dur').textContent='0:00';
  document.getElementById('vc-play').innerHTML='&#9654;';

  /* Show overlay */
  document.getElementById('voverlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('page-content').style.opacity='0';
  document.getElementById('page-content').style.pointerEvents='none';

  /* Play — user gesture is present so this will work */
  audio.play().catch(()=>{});
}

function closeVinyl(){
  audio.pause(); audio.src='';
  spinReset(); clearInterval(vcTimer); vcPlaying=false;
  document.getElementById('voverlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('page-content').style.opacity='1';
  document.getElementById('page-content').style.pointerEvents='';
}

function vcToggle(){ if(vcPlaying) audio.pause(); else audio.play().catch(()=>{}); }
function vcGo(idx){ goTo(idx); openVinyl(idx); }

document.getElementById('needle-btn').onclick=()=>openVinyl(current);
document.getElementById('vclose').onclick=closeVinyl;
document.getElementById('vc-play').onclick=vcToggle;
document.getElementById('vc-prev').onclick=()=>vcGo(Math.max(0,vcIdx-1));
document.getElementById('vc-next').onclick=()=>vcGo((vcIdx+1)%tracks.length);
document.getElementById('vprog-bar').addEventListener('click',function(e){
  if(!audio.duration)return;
  audio.currentTime=((e.clientX-this.getBoundingClientRect().left)/this.offsetWidth)*audio.duration;
});
document.getElementById('voverlay').addEventListener('click',function(e){ if(e.target===this)closeVinyl(); });

function toggleLyrics() {
  const panel = document.getElementById('vlyr-panel');
  const btn   = document.getElementById('vlyr-btn');
  const open  = panel.classList.toggle('open');
  btn.textContent = open ? '✕ Close' : '♬ Lyrics';
}

function updateLyrics(idx) {
  const content = document.getElementById('vlyr-content');
  const panel   = document.getElementById('vlyr-panel');
  const btn     = document.getElementById('vlyr-btn');
  if (lyrics[idx]) {
    content.innerHTML = lyrics[idx].trim().replace(/\n/g,'<br>');
    document.getElementById('vlyr-btn').style.display = 'inline-block';
  } else {
    content.innerHTML = '';
    document.getElementById('vlyr-btn').style.display = 'none';
  }
  // Close panel when switching tracks
  panel.classList.remove('open');
  btn.textContent = '♬ Lyrics';
}

buildSwiper();
buildTracklist();
</script>
